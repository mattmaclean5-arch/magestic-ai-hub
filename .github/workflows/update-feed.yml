name: Refresh live feed

on:
  schedule:
        - cron: "*/5 * * * *"   # every 5 minutes (GitHub batches runs as capacity allows)
  workflow_dispatch: {}    # manual "Run workflow" button

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regenerate data/feed-live.js
        run: node scripts/update-feed.mjs
      - name: Commit if changed
        run: |
          git config user.name "hub-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet data/feed-live.js; then
            git add data/feed-live.js
            git commit -m "chore: hourly feed refresh"
            git push
          else
            echo "No feed changes."
          fi
