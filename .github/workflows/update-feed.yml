name: Refresh live feed

on:
  schedule:
            - cron: "17 * * * *"   # hourly fallback; Supabase dispatches the every-15-min refresh
  workflow_dispatch: {}    # manual "Run workflow" button

concurrency: {group: feed-refresh, cancel-in-progress: false}
permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Regenerate data/feed-live.js
        run: node scripts/update-feed.mjs
      - name: Commit if changed
        run: |
          git config user.name "hub-bot"
          git config user.email "actions@users.noreply.github.com"
          if ! git diff --quiet data/feed-live.js; then
            git add data/feed-live.js
            git commit -m "chore: hourly feed refresh"
                      git push || (git pull --rebase -X theirs origin main && git push)
          else
            echo "No feed changes."
          fi
